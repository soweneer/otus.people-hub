services:
  pg-master:
    image: postgres:18.4
    container_name: pg-master
    environment:
      POSTGRES_DB: people_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-master-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d people_hub" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg-master-data:
