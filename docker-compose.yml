services:
  pg-master:
    image: postgres:18.4
    container_name: pg-master
    environment:
      POSTGRES_DB: people_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-master-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d people_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  citus-coordinator:
    image: &citus-image citusdata/citus:postgres_17
    container_name: citus-coordinator
    environment: &citus-env
      POSTGRES_DB: people_hub_chats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command: &citus-command
      - "postgres"
      - "-c"
      - "shared_preload_libraries=citus"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=16"
      - "-c"
      - "max_replication_slots=16"
    healthcheck: &citus-healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d people_hub_chats"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - citus-coordinator-data:/var/lib/postgresql/data

  citus-worker-1:
    image: *citus-image
    container_name: citus-worker-1
    environment: *citus-env
    command: *citus-command
    healthcheck: *citus-healthcheck
    ports:
      - "5441:5432"
    volumes:
      - citus-worker-1-data:/var/lib/postgresql/data

  citus-worker-2:
    image: *citus-image
    container_name: citus-worker-2
    environment: *citus-env
    command: *citus-command
    healthcheck: *citus-healthcheck
    ports:
      - "5442:5432"
    volumes:
      - citus-worker-2-data:/var/lib/postgresql/data

  citus-worker-3:
    image: *citus-image
    container_name: citus-worker-3
    environment: *citus-env
    command: *citus-command
    healthcheck: *citus-healthcheck
    ports:
      - "5443:5432"
    volumes:
      - citus-worker-3-data:/var/lib/postgresql/data

  chats:
    build:
      context: .
      dockerfile: src/backend/PeopleHub.Chats/Dockerfile
    container_name: people-hub-chats
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: "http://+:8081"
      Kestrel__EndpointDefaults__Protocols: "Http2"
      ConnectionStrings__PostgreSql: "Host=citus-coordinator:5432;Database=people_hub_chats;Username=postgres;Password=postgres;"
      RunMigrationsOnStartup: "${RUN_MIGRATIONS_ON_STARTUP:-true}"
    depends_on:
      citus-coordinator:
        condition: service_healthy
      citus-worker-1:
        condition: service_healthy
      citus-worker-2:
        condition: service_healthy

  redis:
    image: redis:8.0-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: people-hub-app
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__PostgreSql: "Host=pg-master:5432;Database=people_hub;Username=postgres;Password=postgres;"
      ConnectionStrings__Redis: "redis:6379"
      ChatsService__Address: "http://chats:8081"
      FeatureFlags__UseCacheForFeed: "${USE_CACHE_FOR_FEED:-true}"
      RunMigrationsOnStartup: "${RUN_MIGRATIONS_ON_STARTUP:-true}"
    depends_on:
      pg-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      chats:
        condition: service_started
      prometheus:
        condition: service_started
      grafana:
        condition: service_started

volumes:
  pg-master-data:
  citus-coordinator-data:
  citus-worker-1-data:
  citus-worker-2-data:
  citus-worker-3-data:
  redis-data:
  prometheus-data:
  grafana-data:
