services:
  pg-master:
    image: postgres:18.4
    container_name: pg-master
    environment:
      POSTGRES_DB: people_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-master-data:/var/lib/postgresql

  redis:
    image: redis:8.0-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  pg-master-data:
  redis-data:
